<!DOCTYPE html>
<html>
<head>
  <title>Minería USDT</title>
</head>
<body style="background:black;color:white;text-align:center">

<h1>💰 Minería USDT</h1>

<input id="user" placeholder="Usuario"><br><br>
<input id="amount" placeholder="Monto USDT"><br><br>

<button onclick="deposit()">Depositar</button>

<script>
const API = "https://TU-BACKEND";

async function deposit() {
  const res = await fetch(API + "/deposit", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: user.value,
      amount: amount.value
    })
  });

  const data = await res.json();
  window.location = data.invoice_url;
}
</script>

</body>
</html>
